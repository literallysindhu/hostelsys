<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelSys</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Gloock:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS (Alternative CDN via cdnjs) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-deep:    #0e0618;
            --bg-mid:     #160d24;
            --bg-surface: #1e1230;
            --bg-card:    #261740;
            --bg-input:   #1a0f2e;
            --accent-rose: #e8608a;
            --accent-violet: #8b6be8;
            --accent-soft: #c084d4;
            --text-primary: #f4eeff;
            --text-secondary: #a99cc4;
            --text-muted: #6d5f8a;
            --border-subtle: rgba(180,140,255,0.12);
            --border-mid: rgba(180,140,255,0.22);
        }

        /* Global Box Sizing Reset to prevent overflow if CDN fails */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Force full height and reset margins */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            background: var(--bg-deep) !important;
            color: var(--text-primary) !important;
            font-family: 'DM Sans', system-ui, sans-serif !important;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Ambient background orbs ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(139,107,232,0.14) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 85% 80%, rgba(232,96,138,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 55% 45%, rgba(192,132,212,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── Dot grid ── */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(circle, rgba(255,255,255,0.028) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        /* Fixed Navbar */
        .navbar-custom {
            position: fixed;
            top: 0; left: 0; right: 0; z-index: 1000;
            height: 68px;
            padding: 0 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(14, 6, 24, 0.75);
            backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--border-subtle);
        }

        .navbar-brand-text {
            font-family: 'Gloock', serif;
            font-style: italic;
            font-size: 1.55rem;
            letter-spacing: -0.01em;
            background: linear-gradient(110deg, #e8608a 0%, #c084d4 45%, #8b6be8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .navbar-menu {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .navbar-menu a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.01em;
            transition: color 0.2s ease;
            position: relative;
        }

        .navbar-menu a:hover {
            color: var(--text-primary);
        }

        .logout-btn-navbar {
            padding: 8px 18px;
            background: linear-gradient(135deg, #9060e0 0%, #c060a0 100%);
            border: none; border-radius: 11px;
            color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
            letter-spacing: 0.02em; cursor: pointer;
            transition: opacity 0.2s ease, transform 0.18s ease, box-shadow 0.2s ease;
            position: relative; overflow: hidden;
        }
        .logout-btn-navbar::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 60%);
            border-radius: inherit;
        }
        .logout-btn-navbar:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(144,96,224,0.35);
        }

        /* Main App Container */
        .app-root {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Auth Wrapper - Centering Logic */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding-top: 80px;
            /* Navbar offset */
            padding-bottom: 40px;
        }

        /* Card Designs */
        .student-auth-card {
            background: linear-gradient(135deg, #4a148c, #7b1fa2);
            border: 4px solid #000000;
            border-radius: 30px;
            padding: 3rem 4rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            margin: 0 20px;
            /* Ensure spacing on small screens */
        }

        .student-signup-card {
            max-width: 500px;
        }

        /* Icon */
        .student-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            font-size: 2.5rem;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* Typography */
        .card-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #fff;
            letter-spacing: 0.5px;
        }

        /* Form Elements */
        .mb-4 {
            margin-bottom: 1.5rem;
        }

        /* Password Toggle Styles */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 2px solid transparent !important;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            color: #333 !important;
            width: 100%;
        }

        .form-control:focus, .form-select:focus {
            outline: none !important;
            border-color: #ff7eb3 !important;
            box-shadow: 0 0 0 4px rgba(255, 126, 179, 0.2) !important;
        }

        .btn-auth {
            background: #000;
            color: #fff;
            font-weight: 700;
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            border: none;
            font-size: 1.1rem;
            margin-top: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            background: #222;
        }

        .auth-link {
            display: block;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .auth-link:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* Helper for center text */
        .text-center {
            text-align: center;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .navbar-custom {
                padding: 0 2rem;
            }

            .student-auth-card {
                padding: 2rem;
            }

            .card-title {
                font-size: 1.6rem;
            }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggleButtons = document.querySelectorAll('.password-toggle');

            toggleButtons.forEach(button => {
                button.addEventListener('click', function () {
                    const wrapper = this.closest('.password-wrapper');
                    const input = wrapper.querySelector('input');
                    const icon = this.querySelector('i');

                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('bi-eye-slash');
                        icon.classList.add('bi-eye');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('bi-eye');
                        icon.classList.add('bi-eye-slash');
                    }
                });
            });
        });
    </script>
</head>

<body>

    <!-- Navbar -->
    {% block navbar %}
    <nav class="navbar-custom" style="box-sizing: border-box;">
        <a href="/" class="navbar-brand-text">HostelSys</a>
        <div class="navbar-menu">
            <a href="#">Help</a>
            <a href="#">Mission</a>
            <a href="#">About</a>
            {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" style="display: inline; margin: 0;">
                {% csrf_token %}
                <button type="submit" class="logout-btn-navbar">Logout</button>
            </form>
            {% endif %}
        </div>
    </nav>
    {% endblock %}

    <div class="app-root">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
