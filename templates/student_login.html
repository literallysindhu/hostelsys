{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
  <div class="student-auth-card">
    <!-- Circular student icon -->
    <div class="student-icon">
      <i class="bi bi-person-fill"></i>
    </div>

    <h2 class="card-title">Student Login</h2>

    <form method="post" action="{% url 'login_student' %}">
      {% csrf_token %}

      {% if form.errors %}
      <div class="alert alert-danger"
        style="background: rgba(220, 53, 69, 0.9); color: white; border: none; font-size: 0.9rem; margin-bottom: 1rem; border-radius: 8px;">
        Invalid email or password.
      </div>
      {% endif %}

      <div class="form-group">
        {{ form.username }}
      </div>

      <div class="form-group password-wrapper">
        {{ form.password }}
        <span class="password-toggle">
          <i class="bi bi-eye-slash"></i>
        </span>
      </div>

      <button type="submit" class="btn-auth">Login</button>

      <!-- Test Credentials -->
      <div
        style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 0.9rem; color: #e0e0e0; text-align: center; border: 1px dashed rgba(255,255,255,0.2);">
        <strong style="color: #fff;">Test Student Account</strong><br>
        Email: <code style="color: #4cc3ff; background: none; padding: 0;">sr1070@srmist.edu.in</code><br>
        Password: <code style="color: #4cc3ff; background: none; padding: 0;">elsaandnokk</code>
      </div>
    </form>

    <a href="{% url 'signup_student' %}" class="auth-link">New student? Create account</a>
  </div>
</div>
{% endblock %}
